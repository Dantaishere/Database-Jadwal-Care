<!DOCTYPE html>
<html lang="id">
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Pasien Luka</title>
    <!-- Tailwind CSS untuk tampilan modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-6">
        <!-- Header -->
        <header class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800">🩹 Sistem Penjadwalan Kontinu Perawat Luka</h1>
            <p class="text-gray-500 text-sm mt-1">Sistem otomatis memetakan jadwal hari ini, besok, dan lusa berdasarkan interval perawatan secara real-time.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Form Input / Edit Pasien -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 h-fit">
                <h2 id="form-title" class="text-lg font-bold text-gray-700 mb-4">➕ Tambah Pasien Baru</h2>
                <form id="patient-form" class="space-y-4">
                    <input type="hidden" id="patient-id">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nama Pasien</label>
                        <input type="text" id="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Gejala / Jenis Luka</label>
                        <textarea id="symptoms" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Interval (Hari)</label>
                            <input type="number" id="interval" min="1" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="Contoh: 2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Tanggal Mulai</label>
                            <input type="date" id="start-date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        </div>
                    </div>
                    
                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="btn-submit" class="flex-1 bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 transition cursor-pointer text-center text-sm">Simpan Pasien</button>
                        <button type="button" id="btn-cancel" class="hidden bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-400 transition cursor-pointer text-sm">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Daftar Jadwal Pasien -->
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-wrap gap-3 items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-700">📋 Pemetaan Jadwal Pasien Kontinu</h2>
                    <!-- Legend Status -->
                    <div class="flex gap-2 text-xs">
                        <span class="px-2 py-1 bg-red-100 text-red-700 rounded-full font-semibold">🔴 Hari Ini</span>
                        <span class="px-2 py-1 bg-amber-100 text-amber-700 rounded-full font-semibold">🟡 Besok</span>
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full font-semibold">🔵 Lusa</span>
                    </div>
                </div>

                <!-- Container Kartu Pasien -->
                <div id="patient-list" class="space-y-3">
                    <!-- Data akan dirender oleh JavaScript di sini -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi data dari LocalStorage
        let patients = JSON.parse(localStorage.getItem('patients')) || [];

        const form = document.getElementById('patient-form');
        const patientIdInput = document.getElementById('patient-id');
        const nameInput = document.getElementById('name');
        const symptomsInput = document.getElementById('symptoms');
        const intervalInput = document.getElementById('interval');
        const startDateInput = document.getElementById('start-date');
        
        const formTitle = document.getElementById('form-title');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCancel = document.getElementById('btn-cancel');
        const patientList = document.getElementById('patient-list');

        // Fungsi pembantu logika matematika tanggal kontinu
        function getPatientStatus(startDateStr, intervalDays) {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const start = new Date(startDateStr);
            start.setHours(0,0,0,0);
            
            // Hitung selisih hari dari tanggal awal ke hari ini
            const diffTime = today - start;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let daysUntilNext = 0;
            
            if (diffDays <= 0) {
                // Jika tanggal awal adalah hari ini atau masa depan
                daysUntilNext = Math.abs(diffDays);
            } else {
                // Logika Kontinu: Menggunakan Modulo matematika untuk mencari sisa hari pengulangan
                const remainder = diffDays % intervalDays;
                if (remainder !== 0) {
                    daysUntilNext = intervalDays - remainder;
                }
            }

            // Kembalikan status & mark visual berdasarkan sisa hari
            if (daysUntilNext === 0) {
                return { label: "🔴 HARUS DIRAWAT HARI INI", class: "bg-red-50 border-red-300 text-red-800 font-bold", badge: "bg-red-600 text-white" };
            } else if (daysUntilNext === 1) {
                return { label: "🟡 Jadwal Esok Hari (Besok)", class: "bg-amber-50 border-amber-300 text-amber-800 font-medium", badge: "bg-amber-500 text-white" };
            } else if (daysUntilNext === 2) {
                return { label: "🔵 Jadwal Lusa", class: "bg-blue-50 border-blue-300 text-blue-800 text-sm", badge: "bg-blue-500 text-white" };
            } else {
                return { label: `🟢 ${daysUntilNext} Hari Lagi`, class: "bg-green-50 border-green-200 text-green-700 text-sm", badge: "bg-green-500 text-white" };
            }
        }

        // Tampilkan data ke HTML
        function renderPatients() {
            patientList.innerHTML = '';
            
            if (patients.length === 0) {
                patientList.innerHTML = `
                    <div class="bg-white p-8 rounded-xl text-center border border-gray-200 text-gray-400">
                        Belum ada data pasien. Tambahkan pasien di form sebelah kiri.
                    </div>`;
                return;
            }

            // Urutkan pasien agar yang harus dirawat hari ini berada paling atas
            const sortedPatients = [...patients].sort((a, b) => {
                const statusA = getPatientStatus(a.startDate, parseInt(a.interval));
                const statusB = getPatientStatus(b.startDate, parseInt(b.interval));
                // Kasih bobot agar urutan rapi (Hari ini -> Besok -> Lusa -> dst)
                const weight = (lbl) => lbl.includes("HARI INI") ? 0 : lbl.includes("Besok") ? 1 : lbl.includes("Lusa") ? 2 : 3;
                return weight(statusA.label) - weight(statusB.label);
            });

            sortedPatients.forEach(p => {
                const status = getPatientStatus(p.startDate, parseInt(p.interval));
                const formattedDate = new Date(p.startDate).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border shadow-xs flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition ${status.class}`;
                
                card.innerHTML = `
                    <div class="space-y-1 flex-1">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="text-base font-bold text-gray-900">${p.name}</h3>
                            <span class="text-xs px-2 py-0.5 rounded-sm ${status.badge}">${status.label}</span>
                        </div>
                        <p class="text-xs text-gray-600"><span class="font-semibold">Gejala:</span> ${p.symptoms}</p>
                        <div class="flex gap-4 text-xs text-gray-500 pt-1">
                            <span>🔄 Rutinitas: Tiap <b>${p.interval} hari</b></span>
                            <span>📅 Awal Perawatan: ${formattedDate}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 self-end md:self-center">
                        <button onclick="editPatient('${p.id}')" class="px-3 py-1 bg-white border border-gray-300 text-gray-700 text-xs font-medium rounded-md hover:bg-gray-50 transition cursor-pointer shadow-xs">Edit</button>
                        <button onclick="deletePatient('${p.id}')" class="px-3 py-1 bg-red-600 text-white text-xs font-medium rounded-md hover:bg-red-700 transition cursor-pointer shadow-xs">Hapus</button>
                    </div>
                `;
                patientList.appendChild(card);
            });
        }

        // Simpan / Update Pasien
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = patientIdInput.value;
            const patientData = {
                id: id || Date.now().toString(),
                name: nameInput.value,
                symptoms: symptomsInput.value,
                interval: intervalInput.value,
                startDate: startDateInput.value
            };

            if (id) {
                // Mode Edit
                patients = patients.map(p => p.id === id ? patientData : p);
            } else {
                // Mode Tambah Baru
                patients.push(patientData);
            }

            localStorage.setItem('patients', JSON.stringify(patients));
            resetForm();
            renderPatients();
        });

        // Masuk ke Mode Edit Pasien
        window.editPatient = function(id) {
            const p = patients.find(p => p.id === id);
            if (!p) return;

            patientIdInput.value = p.id;
            nameInput.value = p.name;
            symptomsInput.value = p.symptoms;
            intervalInput.value = p.interval;
            startDateInput.value = p.startDate;

            formTitle.innerText = "✏️ Edit Data Pasien";
            btnSubmit.innerText = "Simpan Perubahan";
            btnCancel.classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Hapus Pasien
        window.deletePatient = function(id) {
            if (confirm("Apakah Anda yakin ingin menghapus data pasien ini?")) {
                patients = patients.filter(p => p.id !== id);
                localStorage.setItem('patients', JSON.stringify(patients));
                renderPatients();
                resetForm();
            }
        }

        // Reset Form ke kondisi semula
        function resetForm() {
            form.reset();
            patientIdInput.value = '';
            formTitle.innerText = "➕ Tambah Pasien Baru";
            btnSubmit.innerText = "Simpan Pasien";
            btnCancel.classList.add('hidden');
        }

        btnCancel.addEventListener('click', resetForm);

        // Render otomatis saat aplikasi pertama kali dibuka
        renderPatients();
    </script>
</body>
</html>
